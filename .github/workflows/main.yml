# This is a basic workflow to help you get started with Actions

name: Validate Kllrcoda

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: Checkout Code
      id: checkout-code
      uses: actions/checkout@v5

    - name: Changed Scenarios
      id: changed-scenarios
      uses: tj-actions/changed-files@v46.0.1
      with:
        dir_names: "true"
        dir_names_exclude_current_dir: "true"
        files: |
        files_ignore: |
          .github/**
          **/assets/**
    
    - name: Install CLI
      id: install-cli
      run: |
        pip3 install killercoda-cli==1.3.0 --user
    
    - name: Validate Scenarios
      id: validate-config
      env:
        # We need to exclude assets, as these are not validated.  Only scenario
        # content and construct is validated, not runtime behavior
        ALL_CHANGED_DIRS: ${{ steps.changed-scenarios.outputs.all_changed_files }}
      run: |
        cwd=$(pwd)
        for scenario in ${ALL_CHANGED_DIRS}; do
          echo TESTING $scenario
          cd $cwd/$scenario
          killercoda-cli validate
        done
